# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Math Notes
repo_url: https://github.com/TimeTravelPenguin/math-notes

theme:
  name: material
  locale: en
  palette: 
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  user_color_mode_toggle: true
  highlightjs: true
  hljs_languages:
    - yaml
    - python
    - rust
  shortcuts:
    help: 191 # ?
    next: 78 # n
    previous: 80 # p
    search: 83 # s

markdown_extensions:
  - def_list
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.blocks.caption
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/tasklist.css

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

exclude_docs: |
  CLAUDE.md

nav:
  - Home: index.md
  - About: about.md
  - Topics:
      - Ordinary Differential Equations: odes/index.md
      - Partial Differential Equations: pdes/index.md
      - Fourier Analysis: fourier/index.md
      - Numerical Methods: numerical/index.md
  - Roadmap: roadmap.md
